name: checkfast
description: CheckFast - Presença comprovada, pagamento garantido.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  fl_chart: ^0.66.0 # Para gráficos no dashboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
